# =============================================================
#  山东出版供应链管理平台 - Nginx 配置
#  用途：80 端口对外，静态前端 + 反向代理后端 /api
#  放置：/etc/nginx/sites-available/sd-scm  (再软链到 sites-enabled)
#        或直接替换 /etc/nginx/conf.d/sd-scm.conf
# =============================================================
server {
    listen 80;
    listen [::]:80;
    server_name 39.107.52.146 _;

    # 前端打包产物目录（npm run build 生成的 dist）
    root /opt/sd-scm/frontend/dist;
    index index.html;

    # 允许上传较大附件（与后端保持一致）
    client_max_body_size 20m;

    # 后端 API 反向代理：/api/** -> FastAPI(127.0.0.1:8000)
    # 注意 proxy_pass 不带路径，保留原始 /api 前缀交给后端（后端路由为 /api/v1/...）
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # 前端静态资源长缓存
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # 单页应用路由：任何未命中的路径回退到 index.html，防止刷新 404
    location / {
        try_files $uri $uri/ /index.html;
    }
}
